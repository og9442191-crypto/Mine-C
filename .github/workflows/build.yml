name: Build Mine-C APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: false
        fetch-depth: 1
    
    - name: Download imagefs from Winlator releases
      run: |
        curl -L -o winlator.apk "https://github.com/brunodev85/winlator/releases/download/v10.1.0/Winlator_10.1.apk"
        unzip -j winlator.apk "assets/imagefs.txz" -d app/src/main/assets/
        
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Build APK
      run: ./gradlew assembleDebug
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Mine-C
        path: app/build/outputs/apk/debug/app-debug.apk

name: Build Mine-C APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: false
        fetch-depth: 1
    
    - name: Clone OpenXR SDK
      run: |
        git clone --depth 1 https://github.com/KhronosGroup/OpenXR-SDK.git app/src/main/cpp/OpenXR-SDK

    - name: Download assets from Winlator 7.1
      run: |
        curl -L --retry 3 -o winlator.apk "https://github.com/brunodev85/winlator/releases/download/v7.1.0/Winlator_7.1.apk"
        unzip -j winlator.apk "assets/imagefs.txz" -d app/src/main/assets/
        unzip -j winlator.apk "assets/imagefs_patches.tzst" -d app/src/main/assets/
        
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Install NDK
      run: |
        echo "y" | sdkmanager "ndk;22.1.7171670"
        echo "ndk.dir=$ANDROID_SDK_ROOT/ndk/22.1.7171670" >> local.properties
        echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties
      
    - name: Build APK
      run: ./gradlew assembleDebug
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Mine-C
        path: app/build/outputs/apk/debug/app-debug.apk
